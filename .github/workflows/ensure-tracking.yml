name: Ensure Tracking Snippet

on:
  push:
    branches:
      - main
    paths:
      - "**/*.html"
      - "scripts/ensure-tracking.py"
      - ".github/workflows/ensure-tracking.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ensure-tracking:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Ensure tracking snippet in HTML pages
        run: python3 scripts/ensure-tracking.py

      - name: Commit any additions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A -- '*.html'
          git diff --staged --quiet || git commit -m "chore: ensure Umami tracking snippet on all pages [skip ci]"
          git push
