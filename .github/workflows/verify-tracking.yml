name: Verify Tracking Snippet

on:
  pull_request:
    paths:
      - "**/*.html"
      - "scripts/ensure-tracking.py"
      - ".github/workflows/verify-tracking.yml"

permissions:
  contents: read

jobs:
  verify-tracking:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Verify tracking snippet on all HTML pages
        run: python3 scripts/ensure-tracking.py --check
